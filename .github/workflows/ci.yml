name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  torrent-stream:
    name: Torrent stream (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/torrent-stream
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
